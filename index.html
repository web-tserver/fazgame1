<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAZGAME | Faz Service, Faz Gaming</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --card:rgba(255,255,255,.08);
  --text:#fff;
  --muted:#d1d1d1;
  --accent:#ffd84d;
  --accent-dark:#e6c43d;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text)}
a{text-decoration:none;color:inherit}

header{position:sticky;top:0;z-index:1000;background:rgba(0,0,0,.95);backdrop-filter:blur(12px);padding:10px 16px}
.header-inner{max-width:1200px;margin:auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-weight:800;font-size:18px;color:var(--accent)}
.header-logos{display:flex;gap:14px}
.header-logos img{width:22px;filter:invert(1);opacity:.85}

.banner{position:relative;min-height:320px;overflow:hidden}
.banner-slide{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1s}
.banner-slide.active{opacity:1}
.banner::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.45),rgba(0,0,0,.9))}
.banner-content{position:relative;z-index:2;padding:72px 16px}
.banner-card{max-width:560px;background:rgba(8,8,12,.9);border-radius:20px;padding:26px}
.banner-card h1{font-size:32px;font-weight:800}
.tagline{margin-top:6px;font-weight:600;color:var(--accent)}

.sticky-cta{position:sticky;top:62px;z-index:900;background:rgba(0,0,0,.92);padding:12px 16px}
.btn{display:block;max-width:360px;margin:auto;padding:14px;border-radius:14px;background:var(--accent);color:#000;font-weight:800;text-align:center;transition:.2s}
.btn:hover{background:var(--accent-dark)}

section{padding:40px 16px}
.section-title{font-size:20px;font-weight:800}

.hot-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(min-width:768px){.hot-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1100px){.hot-grid{grid-template-columns:repeat(4,1fr)}}
.hot-card{position:relative;height:180px;background:linear-gradient(180deg,rgba(255,216,77,.28),rgba(255,255,255,.06));border-radius:18px;padding:14px;display:flex;flex-direction:column;justify-content:flex-end}
.hot-title{font-weight:800}
.hot-desc{font-size:13px;color:var(--muted)}
.fire-badge{position:absolute;top:12px;right:12px;font-size:11px;font-weight:800;padding:4px 8px;border-radius:999px;background:#ffb300;color:#000}

/* Fast Sales LIMITED badge */
.fire-badge-limited{background:#ff3b3b;color:#fff}

.controls{margin-bottom:14px}
.search-box{padding:14px;border-radius:14px;border:none;background:rgba(255,255,255,.08);color:#fff;width:100%;max-width:360px}

.filter-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-btn{padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.08);border:none;color:#fff;font-size:12px;cursor:pointer}
.filter-btn.active{background:var(--accent);color:#000}
.filter-count{margin-left:6px;background:#000;padding:2px 6px;border-radius:999px;font-size:10px}

.product-grid{display:grid;gap:14px}
@media(min-width:768px){.product-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1100px){.product-grid{grid-template-columns:repeat(3,1fr)}}
.product-card{background:rgba(255,255,255,.08);border-radius:16px;padding:12px;display:grid;grid-template-columns:72px 1fr;gap:12px;position:relative}
.product-icon{width:72px;height:72px;border-radius:12px;background:#111;display:flex;align-items:center;justify-content:center}
.product-icon img{width:34px;filter:invert(1)}
.product-price{font-weight:800;margin-top:6px}
.product-actions{margin-top:8px}
.check-btn{border:none;cursor:pointer;padding:6px 10px;border-radius:999px;font-size:11px;font-weight:800;background:var(--accent);color:#000}
.check-btn:hover{background:var(--accent-dark)}

.type-badge{position:absolute;top:10px;right:10px;font-size:10px;font-weight:800;padding:3px 6px;border-radius:6px}
.type-game{background:#3cff7f;color:#000}
.type-console{background:#ffd84d;color:#000}
.type-pc{background:#4dd2ff;color:#000}
.type-accessory{background:#ff7a7a;color:#000}

.condition-badge{position:absolute;top:10px;left:10px;font-size:9px;font-weight:600;padding:2px 6px;border-radius:999px}
.condition-new{background:rgba(255,216,77,.45)}
.condition-used{background:rgba(255,255,255,.12)}

footer{text-align:center;padding:24px;color:#aaa}

/* Fast Sales Glow */
.fast-glow{
  box-shadow:0 0 18px rgba(255,216,77,.55), inset 0 0 12px rgba(255,216,77,.25);
  animation:glowPulse 2.2s ease-in-out infinite;
}
@keyframes glowPulse{
  0%{box-shadow:0 0 10px rgba(255,216,77,.35), inset 0 0 6px rgba(255,216,77,.15)}
  50%{box-shadow:0 0 22px rgba(255,216,77,.75), inset 0 0 14px rgba(255,216,77,.35)}
  100%{box-shadow:0 0 10px rgba(255,216,77,.35), inset 0 0 6px rgba(255,216,77,.15)}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">FAZGAME</div>
    <div class="header-logos">
      <img src="https://api.iconify.design/simple-icons/playstation.svg">
      <img src="https://api.iconify.design/simple-icons/xbox.svg">
      <img src="https://api.iconify.design/simple-icons/nintendoswitch.svg">
      <img src="https://api.iconify.design/mdi/desktop-classic.svg">
    </div>
  </div>
</header>

<div class="banner">
  <div class="banner-slide active" style="background-image:url('https://images.unsplash.com/photo-1542751371-adc38448a05e')"></div>
  <div class="banner-slide" style="background-image:url('https://images.unsplash.com/photo-1511512578047-dfb367046420')"></div>
  <div class="banner-content">
    <div class="banner-card">
      <h1>FAZGAME</h1>
      <p class="tagline"><strong>Faz</strong> Service, <strong>Faz</strong> Gaming</p>
    </div>
  </div>
</div>

<div class="sticky-cta">
  <a href="https://wa.me/60163691936" target="_blank" class="btn">Chat on WhatsApp</a>
</div>

<section id="fast-sales">
  <h2 class="section-title">Fast Sales</h2>
  <div class="hot-grid" id="fastGrid"></div>
</section>

<section id="hot">
  <h2 class="section-title">Hot Items</h2>
  <div class="hot-grid" id="hotGrid"></div>
</section>

<section id="stock">
  <h2 class="section-title">Stock Available</h2>
  <div class="controls">
    <input id="search" class="search-box" placeholder="Search item">
  </div>
  <div class="filter-tabs" id="filters"></div>
  <div class="product-grid" id="grid"></div>
</section>

<footer>© 2026 FAZGAME • Faz Service, Faz Gaming</footer>

<script type="module">
/******** FAST SALES & HOT ITEMS (LOAD FROM JS) ********/
let FAST_SALES = [];
let HOT_ITEMS = [];

try {
  const sales = await import('./sales.js');
  FAST_SALES = Array.isArray(sales.FAST_SALES) ? sales.FAST_SALES : [];
  HOT_ITEMS  = Array.isArray(sales.HOT_ITEMS)  ? sales.HOT_ITEMS  : [];
} catch (e) {
  FAST_SALES = [];
  HOT_ITEMS  = [];
}

// Fast Sales
const fastGrid = document.getElementById('fastGrid');
if (FAST_SALES.length === 0) {
  document.getElementById('fast-sales').style.display = 'none';
} else {
  FAST_SALES.forEach(item => {
    fastGrid.insertAdjacentHTML('beforeend', `
      <div class="hot-card fast-glow">
        ${item.limited ? '<span class="fire-badge fire-badge-limited">LIMITED</span>' : ''}
        <div class="hot-title">${item.name}</div>
        <div class="hot-desc">${item.type} • ${item.condition}</div>
        <div class="product-price">RM${item.price}</div>
      </div>
    `);
  });
}

// Hot Items
const hotGrid = document.getElementById('hotGrid');
if (HOT_ITEMS.length === 0) {
  document.getElementById('hot').style.display = 'none';
} else {
  HOT_ITEMS.forEach(item => {
    hotGrid.insertAdjacentHTML('beforeend', `
      <div class="hot-card">
        <span class="fire-badge">HOT</span>
        <div class="hot-title">${item.name}</div>
        <div class="hot-desc">${item.desc}</div>
      </div>
    `);
  });
}
</script>
</body>
</html>
